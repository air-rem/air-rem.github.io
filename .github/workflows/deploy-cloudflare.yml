name: Deploy to Cloudflare Pages

# 每次推送到 main 分支时，自动把站点发布到 Cloudflare Pages。
# 密钥通过 GitHub Secrets 注入，工作流文件本身不含任何明文凭据。
on:
  push:
    branches: [main]
  workflow_dispatch:          # 允许在 Actions 页面手动触发一次部署

permissions:
  contents: read

concurrency:                  # 同一时刻只保留最新一次部署，自动取消进行中的旧任务
  group: cloudflare-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 生成纯净站点目录（排除 .git / .github）
        run: |
          mkdir -p dist
          git archive HEAD | tar -x -C dist
          rm -rf dist/.github

      - name: 发布到 Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@latest pages deploy dist --project-name=air-rem --branch=main --commit-dirty=true
